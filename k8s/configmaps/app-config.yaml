apiVersion: v1
kind: ConfigMap
metadata:
  name: jobpilot-config
  namespace: jobpilot
  labels:
    app.kubernetes.io/part-of: jobpilot
data:
  TEMPORAL_ADDRESS: "temporal.jobpilot.svc.cluster.local:7233"
  REDIS_URL: "redis://redis.jobpilot.svc.cluster.local:6379/0"
  QDRANT_URL: "http://qdrant.jobpilot.svc.cluster.local:6333"
  MINIO_ENDPOINT: "minio.jobpilot.svc.cluster.local:9000"
  LOG_LEVEL: "info"
  ENVIRONMENT: "production"
  API_HOST: "0.0.0.0"
  API_PORT: "8000"
  TEMPORAL_NAMESPACE: "default"
  TEMPORAL_TASK_QUEUE: "jobpilot-tasks"
