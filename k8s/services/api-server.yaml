apiVersion: v1
kind: Service
metadata:
  name: api-server
  namespace: jobpilot
  labels:
    app.kubernetes.io/name: api-server
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: jobpilot
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: api-server
  ports:
    - name: http
      port: 8000
      targetPort: http
      protocol: TCP
