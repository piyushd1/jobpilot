apiVersion: apps/v1
kind: Deployment
metadata:
  name: playwright-pool
  namespace: jobpilot
  labels:
    app.kubernetes.io/name: playwright-pool
    app.kubernetes.io/component: browser
    app.kubernetes.io/part-of: jobpilot
spec:
  replicas: 3
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app.kubernetes.io/name: playwright-pool
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: playwright-pool
        app.kubernetes.io/component: browser
        app.kubernetes.io/part-of: jobpilot
      annotations:
        container.apparmor.security.beta.kubernetes.io/playwright-pool: runtime/default
    spec:
      nodeSelector:
        pool: browser
      terminationGracePeriodSeconds: 30
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: playwright-pool
          image: jobpilot:latest
          imagePullPolicy: IfNotPresent
          command: ["python", "-m", "src.browser_pool"]
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: jobpilot-config
            - secretRef:
                name: jobpilot-secrets
          resources:
            requests:
              cpu: 1000m
              memory: 2Gi
            limits:
              cpu: 1000m
              memory: 2Gi
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: browser-cache
              mountPath: /home/pwuser/.cache
      volumes:
        - name: tmp
          emptyDir: {}
        - name: browser-cache
          emptyDir:
            sizeLimit: 1Gi
