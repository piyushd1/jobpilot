apiVersion: apps/v1
kind: Deployment
metadata:
  name: temporal-worker
  namespace: jobpilot
  labels:
    app.kubernetes.io/name: temporal-worker
    app.kubernetes.io/component: worker
    app.kubernetes.io/part-of: jobpilot
spec:
  replicas: 4
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app.kubernetes.io/name: temporal-worker
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: temporal-worker
        app.kubernetes.io/component: worker
        app.kubernetes.io/part-of: jobpilot
    spec:
      nodeSelector:
        pool: general
      terminationGracePeriodSeconds: 60
      containers:
        - name: temporal-worker
          image: jobpilot:latest
          imagePullPolicy: IfNotPresent
          command: ["python", "-m", "src.worker"]
          ports:
            - name: metrics
              containerPort: 9090
              protocol: TCP
          envFrom:
            - configMapRef:
                name: jobpilot-config
            - secretRef:
                name: jobpilot-secrets
          resources:
            requests:
              cpu: 1000m
              memory: 2Gi
            limits:
              cpu: 1000m
              memory: 2Gi
          livenessProbe:
            exec:
              command:
                - python
                - -c
                - "import os, signal; os.kill(1, signal.SIG_DFL) or True"
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            exec:
              command:
                - python
                - -c
                - "import os, signal; os.kill(1, signal.SIG_DFL) or True"
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
