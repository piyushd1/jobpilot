global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "alert_rules.yml"

scrape_configs:
  - job_name: "jobpilot-api"
    metrics_path: /metrics
    static_configs:
      - targets: ["api:8000"]
        labels:
          service: api-server

  - job_name: "jobpilot-worker"
    metrics_path: /metrics
    static_configs:
      - targets: ["worker:9091"]
        labels:
          service: temporal-worker

  - job_name: "temporal"
    static_configs:
      - targets: ["temporal:9090"]
        labels:
          service: temporal-server

  - job_name: "qdrant"
    static_configs:
      - targets: ["qdrant:6333"]
        labels:
          service: qdrant

  - job_name: "redis"
    static_configs:
      - targets: ["redis:6379"]
        labels:
          service: redis
